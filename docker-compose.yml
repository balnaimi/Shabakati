services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: network-dashboard
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      - network-db-data:/app/data
      - ./server/logs:/app/logs
# Ping scans need raw ICMP in Docker (optional; TCP scan still works without it)
    cap_add:
      - NET_RAW
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  network-db-data:
